openapi: 3.0.0
info:
  title: Alumni Influencers API
  description: >
    Official API documentation for the Westminster Alumni Influencer platform.
  version: 1.0.0

servers:
  - url: http://localhost:5050/api
    description: Local Development Server

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: JWT Authentication token stored in a HttpOnly cookie.

  schemas:
    # --- AUTH REQUEST SCHEMAS ---
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "w1234567@westminster.ac.uk"
          description: "Must be a @westminster.ac.uk or @my.westminster.ac.uk address."
        password:
          type: string
          format: password
          example: "P@ssword123!"
          description: "Min 8 chars, 1 upper, 1 lower, 1 number, 1 special char."

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "w1234567@westminster.ac.uk"
        password:
          type: string
          format: password
          example: "P@ssword123!"

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: "w1234567@westminster.ac.uk"

    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password
          example: "NewP@ssword123!"

    # --- PROFILE REQUEST SCHEMAS ---
    ProfileUpdateOrCreateRequest:
      type: object
      required: [fullName]
      properties:
        fullName: { type: string, example: "John Doe" }
        bio: { type: string, maxLength: 500, example: "Computer Science Alumnus" }
        linkedInUrl: { type: string, format: uri, example: "https://linkedin.com/in/johndoe" }
        attendedEvent: { type: boolean, example: true }
        sponsorshipBalance: { type: number, minimum: 0, example: 50.0 }

    DegreeRequest:
      type: object
      required: [title, institution]
      properties:
        title: { type: string, example: "BSc Computer Science" }
        institution: { type: string, example: "University of Westminster" }
        completionDate: { type: string, format: date, example: "2023-07-01" }
        officialUrl: { type: string, format: uri }

    WorkRequest:
      type: object
      required: [jobTitle, company, startDate]
      properties:
        jobTitle: { type: string, example: "Software Engineer" }
        company: { type: string, example: "Google" }
        startDate: { type: string, format: date, example: "2023-08-01" }
        endDate: { type: string, format: date, nullable: true }
        description: { type: string }

    CertificationRequest:
      type: object
      required: [title, issuer]
      properties:
        title: { type: string, example: "AWS Certified Developer" }
        issuer: { type: string, example: "Amazon Web Services" }
        completionDate: { type: string, format: date }
        courseUrl: { type: string, format: uri }

    licenseRequest:
      type: object
      required: [title, awardingBody]
      properties:
        title: { type: string, example: "Software Engineering License" }
        awardingBody: { type: string, example: "Engineering Council" }
        completionDate: { type: string, format: date }
        licenseUrl: { type: string, format: uri }

    courseRequest:
      type: object
      required: [title, institution]
      properties:
        title: { type: string, example: "Full Stack Web Development" }
        institution: { type: string, example: "Coursera" }
        completionDate: { type: string, format: date }
        courseUrl: { type: string, format: uri }

    # --- RESPONSE SCHEMAS ---
    # Represents structured validation errors from express-validator
    ValidationError:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: "email"
              message:
                type: string
                example: "Please use your university email address."

    # Generic message response for success or error messages
    MessageResponse:
      type: object
      properties:
        msg:
          type: string
          example: "Operation successful"

    # Super schema that covers both express-validator errors and generic messages
    GenericResponse:
      oneOf:
        - $ref: '#/components/schemas/MessageResponse'
        - $ref: '#/components/schemas/ValidationError'

paths:
# --- AUTHENTICATION ENDPOINTS ---
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new alumnus
      description: Validates university email domain and enforces strong password criteria.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful, verification email sent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400':
          description: Validation Error (Invalid domain or weak password).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Log in user
      description: Authenticates user, sets a HttpOnly JWT cookie, and returns a success message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          headers:
            Set-Cookie:
              description: >
                HttpOnly cookie containing the JWT. 
                SameSite=Strict; Max-Age=24 * 60 * 60 * 1000 (1 day);
              schema: 
                type: string
                example: "token=eyJhbG...; HttpOnly; SameSite=Strict"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Validation Error (e.g., missing fields).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '403':
          description: Email not verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: User not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /auth/verify/{token}:
    get:
      tags: [Authentication]
      summary: Verify email address
      description: Validates the 32-byte hex token sent to the user's email.
      parameters:
        - name: token
          in: path
          required: true
          description: The hex string verification token.
          schema:
            type: string
            example: "5f3d... (32-byte hex)"
      responses:
        '200':
          description: Email verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Token expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Invalid token (user not found).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error during verification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/password/forgot:
    post:
      tags: [Authentication]
      summary: Request password reset link
      description: Sends a password reset link to the user's university email if the account exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad Request (Invalid email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error (e.g., email service failure).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/password/reset/{token}:
    post:
      tags: [Authentication]
      summary: Reset password using token
      description: >
        Updates the user's password. Validates the reset token and enforces 
        password strength (min 8 chars, 1 upper, 1 lower, 1 number, 1 special).
      parameters:
        - name: token
          in: path
          required: true
          description: The 32-byte hex reset token sent via email.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Bad Request (Token expired or weak password).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '404':
          description: Invalid token (User not found).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Log out user
      description: >
        Clears the 'token' HttpOnly cookie to log out the user.
      responses:
        '200':
          description: Logout successful.
          headers:
            Set-Cookie:
              description: Instructions to the browser to delete the token cookie.
              schema:
                type: string
                example: "token=; Max-Age=0; path=/; HttpOnly"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

# --- PROFILE MANAGEMENT ENDPOINTS ---
  # --- PUBLIC API ---
  /profiles/featured/alumnus-of-the-day:
    get:
      tags: [Public]
      summary: Get today's featured Alumnus
      description: >
        Returns the profile of the alumnus who won yesterday's bidding session. 
        Publicly accessible without a login.
      responses:
        '200':
          description: Successfully retrieved the winner's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: No featured Alumnus found for today.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server Error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  # --- PRIVATE BASE PROFILE ---
  /profiles/me:
    get:
      tags: [Profile]
      summary: Get current user profile
      description: >
        Retrieves the logged-in user's profile including all sub-resources
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Profile data retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized - No valid token found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: Profile not found (User exists but hasn't created a profile).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server Error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /profiles:
    post:
      tags: [Profile]
      summary: Create or update user profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdateOrCreateRequest' }
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '201':
          description: Profile created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400':
          description: Validation Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /profiles/me/image:
    post:
      tags: [Profile]
      summary: Upload profile image
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profileImage:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string }
                  url: { type: string }
        '400':
          description: Invalid file or no file selected
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  # --- SUB-RESOURCES ---
  responses:
    SubResourceCreated:
      description: Entry added successfully.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MessageResponse' }
    SubResourceUpdated:
      description: Entry updated successfully.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MessageResponse' }
    SubResourceDeleted:
      description: Entry deleted successfully.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MessageResponse' }
    SubResourceNotFound:
      description: The specified entry was not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MessageResponse' }  
    subResouceInputValidationError:
      description: Validation Error (e.g., missing required fields, invalid date formats).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GenericResponse' }
    BadRequest:
      description: Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/MessageResponse' }

  # 1. Degrees
  /profiles/degrees:
    post:
      tags: [Profile Sub-resources]
      summary: Add a new degree
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DegreeRequest' }
      responses:
        '201': { $ref: '#/components/responses/SubResourceCreated' }
        '403': { $ref: '#/components/responses/SubResourceNotFound' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '500': { $ref: '#/components/responses/BadRequest' }

  /profiles/degrees/{id}:
    put:
      tags: [Profile Sub-resources]
      summary: Update a degree
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DegreeRequest' }
      responses:
        '200': { $ref: '#/components/responses/SubResourceUpdated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Profile Sub-resources]
      summary: Delete a degree
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { $ref: '#/components/responses/SubResourceDeleted' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  # 2. Certifications
  /profiles/certifications:
    post:
      tags: [Profile Sub-resources]
      summary: Add a certification
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CertificationRequest' }
      responses:
        '201': { $ref: '#/components/responses/SubResourceCreated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '403': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  /profiles/certifications/{id}:
    put:
      tags: [Profile Sub-resources]
      summary: Update a certification
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CertificationRequest' }
      responses:
        '200': { $ref: '#/components/responses/SubResourceUpdated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Profile Sub-resources]
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { $ref: '#/components/responses/SubResourceDeleted' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  # 3. Experience (Work)
  /profiles/experience:
    post:
      tags: [Profile Sub-resources]
      summary: Add work experience
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkRequest' }
      responses:
        '201': { $ref: '#/components/responses/SubResourceCreated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '403': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  /profiles/experience/{id}:
    put:
      tags: [Profile Sub-resources]
      summary: Update work experience
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkRequest' }
      responses:
        '200': { $ref: '#/components/responses/SubResourceUpdated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Profile Sub-resources]
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { $ref: '#/components/responses/SubResourceDeleted' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  # 4. Licenses
  /profiles/licenses:
    post:
      tags: [Profile Sub-resources]
      summary: Add a license
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/licenseRequest' }
      responses:
        '201': { $ref: '#/components/responses/SubResourceCreated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '403': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  /profiles/licenses/{id}:
    put:
      tags: [Profile Sub-resources]
      summary: Update a license
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/licenseRequest' }
      responses:
        '200': { $ref: '#/components/responses/SubResourceUpdated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Profile Sub-resources]
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { $ref: '#/components/responses/SubResourceDeleted' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  # 5. Courses
  /profiles/courses:
    post:
      tags: [Profile Sub-resources]
      summary: Add a course
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/courseRequest' }
      responses:
        '201': { $ref: '#/components/responses/SubResourceCreated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '403': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }

  /profiles/courses/{id}:
    put:
      tags: [Profile Sub-resources]
      summary: Update a course
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/courseRequest' }
      responses:
        '200': { $ref: '#/components/responses/SubResourceUpdated' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }
    delete:
      tags: [Profile Sub-resources]
      security: [{ cookieAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { $ref: '#/components/responses/SubResourceDeleted' }
        '400': { $ref: '#/components/responses/subResouceInputValidationError' }
        '404': { $ref: '#/components/responses/SubResourceNotFound' }
        '500': { $ref: '#/components/responses/BadRequest' }