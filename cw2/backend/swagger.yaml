openapi: 3.0.0
info:
  title: Alumni Influencer API
  version: 1.0.0
  description: API documentation aligned with implemented routes/controllers.

servers:
  - url: http://localhost:5050/api
    description: Local development server

tags:
  - name: Auth
  - name: Profile
  - name: Bidding
  - name: API Keys
  - name: Analytics
  - name: Directory
  - name: Public / External

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token
      description: JWT is stored in an HTTP-only cookie named `token`.
    bearerAuth:
      type: http
      scheme: bearer
      description: API key auth via `Authorization: Bearer <API_KEY>` (not JWT).

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID v4 resource identifier.
    ProgrammeQuery:
      name: programme
      in: query
      required: false
      schema:
        type: string
      description: Filter by degree title/programme.
    GradDateQuery:
      name: gradDate
      in: query
      required: false
      schema:
        type: string
        example: "2024"
      description: Filter by graduation year (YYYY).

  schemas:
    MessageResponse:
      type: object
      properties:
        msg:
          type: string
      additionalProperties: true

    ValidationErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              msg:
                type: string

    GenericErrorResponse:
      oneOf:
        - $ref: "#/components/schemas/MessageResponse"
        - $ref: "#/components/schemas/ValidationErrorResponse"

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [alumni, developer, dashboard]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          format: password

    ProfileRequest:
      type: object
      properties:
        fullName: { type: string }
        city: { type: string }
        country: { type: string }
        bio: { type: string }
        linkedInUrl: { type: string, format: uri }
        attendedEvent: { type: boolean }
        sponsorshipBalance: { type: number, minimum: 0 }

    DegreeRequest:
      type: object
      properties:
        title: { type: string }
        institution: { type: string }
        completionDate: { type: string, format: date }
        officialUrl: { type: string, format: uri }

    CertificationRequest:
      type: object
      properties:
        title: { type: string }
        issuer: { type: string }
        completionDate: { type: string, format: date }
        certificationUrl: { type: string, format: uri }

    ExperienceRequest:
      type: object
      properties:
        jobTitle: { type: string }
        company: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        description: { type: string }
        isCurrent: { type: boolean }

    LicenseRequest:
      type: object
      properties:
        title: { type: string }
        awardingBody: { type: string }
        completionDate: { type: string, format: date }
        licenseUrl: { type: string, format: uri }

    CourseRequest:
      type: object
      properties:
        title: { type: string }
        institution: { type: string }
        completionDate: { type: string, format: date }
        courseUrl: { type: string, format: uri }

    BidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: float
          minimum: 0.01

    ApiKeyGenerateRequest:
      type: object
      required: [clientType]
      properties:
        clientType:
          type: string
          enum: [dashboard, ar_app]
        label:
          type: string
          maxLength: 50

    DashboardReportRequest:
      type: object
      properties:
        filters:
          type: object
          properties:
            programme:
              type: string
            gradDate:
              type: string
        charts:
          type: object
          properties:
            skills: { type: string, description: Base64/data URI chart image }
            cert: { type: string, description: Base64/data URI chart image }
            jobs: { type: string, description: Base64/data URI chart image }
            geo: { type: string, description: Base64/data URI chart image }
            emp: { type: string, description: Base64/data URI chart image }
            prog: { type: string, description: Base64/data URI chart image }

paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User details (without password).
        "401":
          description: Not authenticated / invalid or expired token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }
        "404":
          description: User not found.

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Registration successful.
        "400":
          description: Validation error/domain/password/business rule failure.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "500":
          description: Server error.

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user and set JWT cookie
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful. Sets `token` HTTP-only cookie.
        "401":
          description: Invalid credentials.
        "403":
          description: Email not verified.
        "404":
          description: User not found.
        "500":
          description: Login error.

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout user and clear JWT cookie
      responses:
        "200":
          description: Logout successful.

  /auth/verify/{token}:
    get:
      tags: [Auth]
      summary: Verify email using token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully.
        "400":
          description: Token expired.
        "404":
          description: Invalid token.
        "500":
          description: Verification failed.

  /auth/password/forgot:
    post:
      tags: [Auth]
      summary: Send password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForgotPasswordRequest" }
      responses:
        "200":
          description: Reset link sent.
        "400":
          description: Validation error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "404":
          description: User not found.
        "500":
          description: Server error.

  /auth/password/reset/{token}:
    post:
      tags: [Auth]
      summary: Reset password using reset token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordRequest" }
      responses:
        "200":
          description: Password reset successful.
        "400":
          description: Validation error / token expired / weak password.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "404":
          description: Invalid token.
        "500":
          description: Server error.

  /profiles/me:
    get:
      tags: [Profile]
      summary: Get current alumni profile with sub-resources
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Profile retrieved.
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized.
        "404":
          description: Profile not found.
        "500":
          description: Server error.

  /profiles:
    post:
      tags: [Profile]
      summary: Create profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileRequest" }
      responses:
        "201":
          description: Profile created.
        "400":
          description: Validation error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized.
        "404":
          description: Profile already exists.
        "500":
          description: Server error.
    put:
      tags: [Profile]
      summary: Update profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileRequest" }
      responses:
        "200":
          description: Profile updated.
        "400":
          description: Validation error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized.
        "404":
          description: Profile not found.
        "500":
          description: Server error.

  /profiles/me/image:
    post:
      tags: [Profile]
      summary: Upload profile image
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [profileImage]
              properties:
                profileImage:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile image updated.
        "400":
          description: Missing/invalid image.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized.
        "404":
          description: Profile not found.
        "500":
          description: Failed to save image path.

  /profiles/degrees:
    post:
      tags: [Profile]
      summary: Add degree entry
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DegreeRequest" }
      responses:
        "201": { description: Added successfully. }
        "400":
          description: Validation error.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericErrorResponse" }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Create profile first. }
        "500": { description: Server error. }

  /profiles/degrees/{id}:
    put:
      tags: [Profile]
      summary: Update degree entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DegreeRequest" }
      responses:
        "200": { description: Updated successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found or unauthorized. }
        "500": { description: Server error. }
    delete:
      tags: [Profile]
      summary: Delete degree entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: Deleted successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found. }
        "500": { description: Server error. }

  /profiles/certifications:
    post:
      tags: [Profile]
      summary: Add certification entry
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertificationRequest" }
      responses:
        "201": { description: Added successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Create profile first. }
        "500": { description: Server error. }

  /profiles/certifications/{id}:
    put:
      tags: [Profile]
      summary: Update certification entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CertificationRequest" }
      responses:
        "200": { description: Updated successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found or unauthorized. }
        "500": { description: Server error. }
    delete:
      tags: [Profile]
      summary: Delete certification entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: Deleted successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found. }
        "500": { description: Server error. }

  /profiles/experiences:
    post:
      tags: [Profile]
      summary: Add experience entry
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExperienceRequest" }
      responses:
        "201": { description: Added successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Create profile first. }
        "500": { description: Server error. }

  /profiles/experiences/{id}:
    put:
      tags: [Profile]
      summary: Update experience entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExperienceRequest" }
      responses:
        "200": { description: Updated successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found or unauthorized. }
        "500": { description: Server error. }
    delete:
      tags: [Profile]
      summary: Delete experience entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: Deleted successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found. }
        "500": { description: Server error. }

  /profiles/licenses:
    post:
      tags: [Profile]
      summary: Add license entry
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LicenseRequest" }
      responses:
        "201": { description: Added successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Create profile first. }
        "500": { description: Server error. }

  /profiles/licenses/{id}:
    put:
      tags: [Profile]
      summary: Update license entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LicenseRequest" }
      responses:
        "200": { description: Updated successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found or unauthorized. }
        "500": { description: Server error. }
    delete:
      tags: [Profile]
      summary: Delete license entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: Deleted successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found. }
        "500": { description: Server error. }

  /profiles/courses:
    post:
      tags: [Profile]
      summary: Add course entry
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CourseRequest" }
      responses:
        "201": { description: Added successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Create profile first. }
        "500": { description: Server error. }

  /profiles/courses/{id}:
    put:
      tags: [Profile]
      summary: Update course entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CourseRequest" }
      responses:
        "200": { description: Updated successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found or unauthorized. }
        "500": { description: Server error. }
    delete:
      tags: [Profile]
      summary: Delete course entry
      security: [{ cookieAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/IdParam" }]
      responses:
        "200": { description: Deleted successfully. }
        "400": { description: Validation error. }
        "401": { description: No token / invalid token. }
        "403": { description: User role not authorized. }
        "404": { description: Entry not found. }
        "500": { description: Server error. }

  /bids:
    post:
      tags: [Bidding]
      summary: Place or increase today's bid
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BidRequest" }
      responses:
        "200":
          description: Existing bid increased.
        "201":
          description: New bid placed.
        "400":
          description: Validation/insufficient funds/bid too low.
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized or monthly win limit reached.
        "404":
          description: Create profile first.
        "500":
          description: Server error.

  /bids/me:
    get:
      tags: [Bidding]
      summary: Get current user's bid for today
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Bid found.
        "401":
          description: No token / invalid token.
        "403":
          description: User role not authorized.
        "404":
          description: No bid placed today.
        "500":
          description: Server error.

  /keys:
    post:
      tags: [API Keys]
      summary: Generate API key
      description: Developer endpoint. Assigns scopes by `clientType`.
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApiKeyGenerateRequest" }
      responses:
        "201":
          description: API key generated.
        "400":
          description: Validation error / invalid client type.
        "401":
          description: No token / invalid token.
        "403":
          description: Role not authorized.
        "500":
          description: Server error.

  /keys/me:
    get:
      tags: [API Keys]
      summary: List authenticated developer API keys
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: API keys retrieved.
        "401":
          description: No token / invalid token.
        "403":
          description: Role not authorized.
        "500":
          description: Server error.

  /keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke API key
      security: [{ cookieAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Key revoked.
        "400":
          description: Validation error (invalid UUID).
        "401":
          description: No token / invalid token.
        "403":
          description: Role not authorized.
        "404":
          description: Key not found or unauthorized.
        "500":
          description: Server error.

  /keys/{id}/stats:
    get:
      tags: [API Keys]
      summary: Get API key usage stats
      security: [{ cookieAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Usage stats retrieved.
        "400":
          description: Validation error (invalid UUID).
        "401":
          description: No token / invalid token.
        "403":
          description: Role not authorized.
        "404":
          description: Key not found or unauthorized.
        "500":
          description: Server error.

  /keys/featured/alumnus-of-the-day:
    get:
      tags: [Public / External]
      summary: Get featured alumnus of the day
      description: "Required API key scope: `read:alumni_of_day`."
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Profile retrieved.
        "401":
          description: Missing/invalid bearer header format.
        "403":
          description: Invalid/revoked key or insufficient scope.
        "404":
          description: No featured alumnus today.
        "500":
          description: Server error.

  /keys/analytics/skills-gap:
    get:
      tags: [Analytics]
      summary: Skills gap analytics
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProgrammeQuery"
        - $ref: "#/components/parameters/GradDateQuery"
      responses:
        "200": { description: Skills gap data returned (JSON array). }
        "401": { description: Missing/invalid bearer header format. }
        "403": { description: Invalid/revoked key or insufficient scope. }
        "500": { description: Server error. }

  /keys/analytics/job-trends:
    get:
      tags: [Analytics]
      summary: Job title trends
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProgrammeQuery"
        - $ref: "#/components/parameters/GradDateQuery"
      responses:
        "200": { description: Job trends data returned (JSON array). }
        "401": { description: Missing/invalid bearer header format. }
        "403": { description: Invalid/revoked key or insufficient scope. }
        "500": { description: Server error. }

  /keys/analytics/top-employers:
    get:
      tags: [Analytics]
      summary: Top employers analytics
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProgrammeQuery"
        - $ref: "#/components/parameters/GradDateQuery"
      responses:
        "200": { description: Top employers data returned (JSON array). }
        "401": { description: Missing/invalid bearer header format. }
        "403": { description: Invalid/revoked key or insufficient scope. }
        "500": { description: Server error. }

  /keys/analytics/geography:
    get:
      tags: [Analytics]
      summary: Geographical distribution analytics
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProgrammeQuery"
        - $ref: "#/components/parameters/GradDateQuery"
      responses:
        "200": { description: Geography data returned (JSON array). }
        "401": { description: Missing/invalid bearer header format. }
        "403": { description: Invalid/revoked key or insufficient scope. }
        "500": { description: Server error. }

  /keys/analytics/certification-trends:
    get:
      tags: [Analytics]
      summary: Certification trends analytics
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/ProgrammeQuery"
        - $ref: "#/components/parameters/GradDateQuery"
      responses:
        "200": { description: Certification trend data returned (JSON array). }
        "401": { description: Missing/invalid bearer header format. }
        "403": { description: Invalid/revoked key or insufficient scope. }
        "500": { description: Server error. }

  /keys/analytics/programme-distribution:
    get:
      tags: [Analytics]
      summary: Programme distribution analytics
      description: "Required API key scope: `read:analytics`."
      security: [{ bearerAuth: [] }]
