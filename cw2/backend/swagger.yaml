# --- BIDDING ENDPOINTS ---
  /bids:
    post:
      tags: [Bidding]
      summary: Place or increase a daily bid
      description: >
        Allows a user to place a blind bid for 'Alumnus of the Day'. 
        If a bid already exists for today, it updates it (only if the new amount is higher). 
        Enforces monthly win limits (3 or 4 wins based on event attendance).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BidRequest'
      responses:
        '200':
          description: Bid updated successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BidResponse' }
        '201':
          description: New bid placed successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BidResponse' }
        '400':
          description: >
            Bad Request: Insufficient funds, bid lower than previous, 
            or validation error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '403':
          description: Monthly win limit reached / Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: Profile not found (User must create a profile before bidding).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /bids/me:
    get:
      tags: [Bidding]
      summary: Get user's bid for today
      description: Returns the user's current bid amount and live status for today's session.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Bid data retrieved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MyBidResponse' }
        '403':
          description: Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: No bid placed today.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

# --- API KEY MANAGEMENT ENDPOINTS ---
  /keys:
    post:
      tags: [API Key Management]
      summary: Generate a new API key
      description: >
        Creates a new API key for accessing the public API. 
        Requires authentication and is rate-limited to prevent abuse.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: A user-defined name for the API key (e.g., "My App Key").
                  example: "My App Key"
      responses:
        '201':
          description: API key generated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey: { type: string, example: "abcdef123456..." }
                  msg: { type: string, example: "API key created successfully." }
        '400':
          description: Validation Error (e.g., missing label).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '403':
          description: Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
  
  /keys/me:
    get:
      tags: [API Key Management]
      summary: List user's API keys
      description: Retrieves all API keys associated with the authenticated user, including their labels and creation dates.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: API keys retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string, example: "API keys retrieved successfully." }
                  apiKeys:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        key: { type: string }
                        label: { type: string }
                        isActive: { type: boolean }
                        createdAt: { type: string, format: date-time }
                        userId: { type: string, format: uuid }
        '403':
          description: Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /keys/{id}:
    delete:
      tags: [API Key Management]
      summary: Revoke an API key
      description: Deletes the specified API key, preventing any further use for authentication.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The UUID of the API key to revoke.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API key revoked successfully.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400':
          description: Validation Error (e.g., invalid ID format).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '403':
          description: Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: API key not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /keys/{id}/stats:
    get:
      tags: [API Key Management]
      summary: Get API key usage statistics
      description: >
        Retrieves usage statistics for the specified API key, including total requests.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The UUID of the API key to retrieve stats for.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: API key statistics retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg: { type: string }
                  stats:
                    type: object
                    properties:
                      totalHits: { type: integer, example: 123 }
                      recentLogs: { type: array, items: { $ref: '#/components/schemas/ApiUsageResponse' } }
        '400':
          description: Validation Error (e.g., invalid ID format).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenericResponse' }
        '403':
          description: Forbidden - Insufficient Permissions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '404':
          description: API key not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '500':
          description: Server error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

